<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Xıdırlı loqosu: nar motivi (Qarabağ rəmzi), isti torpaq fonunda -->
  <rect width="512" height="512" rx="104" fill="#F6EFE2"/>
  <!-- nar gövdəsi -->
  <circle cx="256" cy="300" r="148" fill="#8E2A3A"/>
  <!-- nar tacı -->
  <path d="M216 168 L232 120 L256 152 L280 116 L298 168 Z" fill="#8E2A3A"/>
  <!-- işıq refleksi -->
  <path d="M170 250 a110 110 0 0 1 70 -70" stroke="#B5542D" stroke-width="26" stroke-linecap="round" fill="none" opacity="0.85"/>
  <!-- dənələr (üç dənə — keçmiş, bugün, gələcək) -->
  <circle cx="226" cy="296" r="20" fill="#F6EFE2" opacity="0.92"/>
  <circle cx="284" cy="272" r="20" fill="#E8A93C" opacity="0.95"/>
  <circle cx="272" cy="336" r="20" fill="#F6EFE2" opacity="0.92"/>
  <!-- yarpaq — günəbaxan sarısı vurğu -->
  <path d="M312 150 q52 -18 74 18 q-46 26 -74 -18" fill="#5A6B3F"/>
</svg>
